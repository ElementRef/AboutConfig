[general]

# 网络测试链接
;network_check_url=http://captive.apple.com/generate_204
;network_check_url=http://cp.cloudflare.com/generate_204
;network_check_url=http://www.qualcomm.cn/generate_204
network_check_url=http://www.gstatic.com/generate_204
# 网页响应性测试，通过节点访问此网页，获得 HTTP 响应所需要的时间，来确认节点的可用性
;server_check_url=http://captive.apple.com/generate_204
;server_check_url=http://cp.cloudflare.com/generate_204
;server_check_url=http://www.qualcomm.cn/generate_204
server_check_url=http://www.gstatic.com/generate_204
# 服务器测试超时时间 (毫秒，小于 5000 毫秒才生效)
server_check_timeout=3000
# 图标显示设置
profile_img_url=https://cdn.jsdelivr.net/gh/ElementRef/AboutConfig@main/logo/others/koolson.qure.aaex.png?raw
# 节点信息展示
;geo_location_checker=https://ip-api.com/json/?lang=zh-CN,https://cdn.jsdelivr.net/gh/ElementRef/AboutConfig@main/script/kop.xiao.ip.api.js?raw
geo_location_checker=https://ifconfig.co/json,https://cdn.jsdelivr.net/gh/ElementRef/AboutConfig@main/script/kop.xiao.ip.api.js?raw
# 引用资源转换
resource_parser_url=https://cdn.jsdelivr.net/gh/ElementRef/AboutConfig@main/script/kop.xiao.resource.parser.js?raw
# 下列路径将不处理，跳过代理
excluded_routes=239.255.255.250/32,24.105.30.129/32,185.60.112.157/32,185.60.112.158/32,182.162.132.1/32
# UDP 白名单
;udp_whitelist=1-442,444-65535
# UDP 黑名单
udp_drop_list=443,STUN,QUIC
# 根据网络自动切换「分流/直连/全局代理」模式
# 第一个，使用蜂窝网络时，开启规则分流
# 第二个，其他 wifi* 下，开启规则分流
# 第三个，连接 wifi1 时，开启直连模式
# 第四个，连接 wifi2 时，开启全局代理
running_mode_trigger=filter,filter,wifi1:all_direct,wifi2:all_proxy
# 防止代理检测，DNS 排除列表，不使用 fake-ip，其它域名则全部采用 fake-ip 及远程解析
dns_exclusion_list=*.10099.com.cn,*.126.net,*.blzstatic.cn,*.boc.cn,*.ccb.com,*.cmbchina.com,*.cmpassport.com,*.direct,*.icitymobile.mobi,*.jegotrip.com.cn,*.lan,*.logon.battle.net,*.logon.battlenet.com.cn,*.ninebot.com,*.ntp.org.cn,*.pingan.com.cn,*.wosms.cn,*.xboxlive.com,api.joox.com,auth.wosms.cn,cable.auth.com,dl.stream.qqmusic.qq.com,enrichgw.10010.com,global.stun.twilio.com,global.turn.twilio.com,id6.me,injections.adguard.org,isure.stream.qqmusic.qq.com,local.adguard.org,localhost.*.qq.com,localhost.*.weixin.qq.com,mdn.open.wo.cn,music.163.com,music.migu.cn,network-test.debian.org,ntp?.*.com,ntp.*.com,opencloud.wostore.cn,proxy.golang.org,resolver1.opendns.com,time?.*.com,time.*.com,time.*.edu.cn,time.*.gov,xbox.*.microsoft.com,stun.l.google.com,stun*.l.google.com
# 仅支持末端策略（direct、reject 以及节点）
fallback_udp_policy=direct
# 控制系统对 ICMP 请求的自动回复行为；设置为 false 可以实现“隐藏”主机不被 ping 到的效果；但需要手动处理及回复 ICMP 数据包
icmp_auto_reply=false

