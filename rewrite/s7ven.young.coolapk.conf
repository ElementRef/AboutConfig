# https://raw.githubusercontent.com/S7venYoung/QuantumultX/master/CoolApk_remove_ads_qx.conf
hostname=api.coolapk.com
^https:\/\/api\.coolapk\.com\/v6\/feed\/detail\? url jsonjq-response-body '.data.hotReplyRows |= if . then map(select(.id?)) else . end | .data.topReplyRows |= if . then map(select(.id?)) else . end | .data.detailSponsorCard=[] | .data.include_goods=[] | .data.include_goods_ids=[]'
^https:\/\/api\.coolapk\.com\/v6\/feed\/replyList url jsonjq-response-body 'if .data? and ((.data | type) == "array") and (.data | length > 0) then .data |= map(select(.id?)) else . end'
^https:\/\/api\.coolapk\.com\/v6\/main\/dataList url jsonjq-response-body '.data |= (if (type=="array" and length>0) then map(select((.entityTemplate!="sponsorCard") and (.title!="精选配件"))) else . end)'
^https:\/\/api\.coolapk\.com\/v6\/main\/indexV8 url jsonjq-response-body '.data |= (if length > 0 then map(select((.entityTemplate != "sponsorCard") and (.entityId != 8639) and (.entityId != 29349) and (.entityId != 33006) and (.entityId != 32557) and ((.title // "" | test("值得买|红包")) | not))) else . end)'
^https:\/\/api\.coolapk\.com\/v6\/main\/init url jsonjq-response-body '.data |= map(select((.entityId? != 944) and (.entityId? != 945) and (.entityId? != 6390)) | if .entityId == 20131 then .entities |= map(select(.title != "酷品")) else . end)'
^https:\/\/api\.coolapk\.com\/v6\/page\/dataList url jsonjq-response-body 'if (.data | length > 0) then .data |= map(select((.title? != "酷安热搜") and (.entityTemplate? != "imageScaleCard") and (.entityTemplate? != "sponsorCard"))) else . end'
^https:\/\/api\.coolapk\.com\/v6\/search\?.*type=hotSearch url reject-dict
